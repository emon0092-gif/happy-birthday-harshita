<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Harshita 🎉</title>

<style>
body {
  margin: 0;
  padding: 0;
  text-align: center;
  font-family: Arial;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  overflow: hidden;
}

h1 {
  margin-top: 100px;
  font-size: 3em;
  color: white;
}

p {
  font-size: 1.5em;
  color: white;
}

button {
  padding: 15px 25px;
  font-size: 1em;
  border: none;
  border-radius: 10px;
  background: white;
  cursor: pointer;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
}
</style>
</head>

<body>

<h1 id="title">🎂 Happy Birthday Harshita 🎂</h1>
<p id="message">Click below for a surprise 👇</p>

<button onclick="start()">Click Me 🎁</button>

<canvas id="confetti"></canvas>

<script>
// Typing effect
let text = "Wishing you happiness, success & endless smiles 💖";
let i = 0;

function typeEffect() {
  if (i < text.length) {
    document.getElementById("message").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 50);
  }
}

// Confetti animation
function start() {
  document.getElementById("message").innerHTML = "";
  typeEffect();
  confettiStart();
}

const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];

for (let i = 0; i < 100; i++) {
  pieces.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 5 + 2,
    speed: Math.random() * 3 + 1
  });
}

function confettiStart() {
  setInterval(() => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      ctx.fillStyle = "white";
      ctx.fillRect(p.x, p.y, p.size, p.size);
      p.y += p.speed;

      if (p.y > canvas.height) {
        p.y = 0;
      }
    });
  }, 20);
}
</script>

</body>
</html>
